<section id="gallery" class="py-24 lg:py-32 bg-secondary">
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div #galleryItem class="reveal text-center mb-16">
      <p class="section-label">{{ i18n.t('gallery.label') }}</p>
      <h2 class="section-title" [innerHTML]="i18n.t('gallery.title')"></h2>
      <div class="w-12 h-0.5 bg-accent mx-auto"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      @for (image of images; track image.url; let i = $index) {
        <div
          #galleryItem
          class="reveal group relative overflow-hidden aspect-[5/6] cursor-pointer"
          [style.transition-delay.ms]="i * 100"
        >
          <img
            [src]="image.url"
            [alt]="image.alt"
            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-500 group-hover:scale-110"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-primary via-transparent to-transparent"
          ></div>
          <div
            class="absolute inset-0 border border-white/20 opacity-0 group-hover:opacity-100 transition-opacity duration-300"
          ></div>
        </div>
      }
    </div>
  </div>
</section>
