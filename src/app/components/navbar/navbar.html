<nav
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-500"
  [class.bg-primary]="isScrolled() || isMobileMenuOpen()"
  [class.bg-transparent]="!isScrolled() && !isMobileMenuOpen()"
>
  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex items-center justify-between h-20 lg:h-24">
      <div class="hidden lg:flex items-center gap-8">
        @for (link of navLinks(); track link.href; let i = $index) {
          <button
            (click)="scrollToSection(link.href)"
            class="nav-link"
            [class.nav-link-active]="i === 0"
          >
            {{ link.label }}
          </button>
        }
      </div>

      <a
        href="#hero"
        class="absolute left-1/2 -translate-x-1/2 lg:static lg:transform-none font-playfair text-2xl lg:text-3xl font-bold text-white tracking-wide"
      >
        TONY <span class="text-accent">ESTILO</span>
      </a>

      <div class="hidden lg:flex items-center gap-6">
        <div class="flex items-center gap-2">
          <button
            (click)="setLanguage('es')"
            class="flex items-center gap-2 px-3 py-2 text-xs uppercase tracking-wider transition-all duration-200 rounded"
            [class.text-accent]="currentLang === 'es'"
            [class.text-white/50]="currentLang !== 'es'"
            [class.hover:text-white]="currentLang !== 'es'"
          >
            <svg class="w-5 h-4 rounded-sm" viewBox="0 0 640 480">
              <path fill="#c60b1e" d="M0 0h640v480H0z" />
              <path fill="#ffc400" d="M0 120h640v240H0z" />
            </svg>
            <span>ES</span>
          </button>
          <button
            (click)="setLanguage('en')"
            class="flex items-center gap-2 px-3 py-2 text-xs uppercase tracking-wider transition-all duration-200 rounded"
            [class.text-accent]="currentLang === 'en'"
            [class.text-white/50]="currentLang !== 'en'"
            [class.hover:text-white]="currentLang !== 'en'"
          >
            <svg class="w-5 h-4 rounded-sm" viewBox="0 0 640 480">
              <path fill="#012169" d="M0 0h640v480H0z" />
              <path
                fill="#fff"
                d="m75 0 244 181L562 0h78v62L400 241l240 178v61h-80L320 301 81 480H0v-60l239-178L0 64V0h75z"
              />
              <path
                fill="#C8102E"
                d="m424 281 216 159v40L369 281h55zm-184 20 6 35L54 480H0l240-179zM640 0v3L391 191l2-44L590 0h50zM0 0l239 176h-60L0 42V0z"
              />
              <path fill="#fff" d="M241 0v480h160V0H241zM0 160v160h640V160H0z" />
              <path fill="#C8102E" d="M0 193v96h640v-96H0zM273 0v480h96V0h-96z" />
            </svg>
            <span>EN</span>
          </button>
        </div>

        <button (click)="scrollToSection('#contact')" class="btn-primary text-xs py-3 px-6">
          {{ i18n.t('nav.book') }}
        </button>
      </div>

      <button (click)="toggleMobileMenu()" class="lg:hidden text-white p-2" aria-label="Menu">
        @if (!isMobileMenuOpen()) {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
        } @else {
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        }
      </button>
    </div>
  </div>

  @if (isMobileMenuOpen()) {
    <div class="lg:hidden bg-primary border-t border-white/10">
      <div class="px-6 py-8 flex flex-col gap-6">
        @for (link of navLinks(); track link.href) {
          <button
            (click)="scrollToSection(link.href)"
            class="text-left text-white text-lg font-medium"
          >
            {{ link.label }}
          </button>
        }

        <div class="flex items-center gap-4 pt-4 border-t border-white/10">
          <button
            (click)="setLanguage('es')"
            class="flex items-center gap-2 px-4 py-3 text-sm rounded"
            [class.bg-accent]="currentLang === 'es'"
            [class.text-white]="currentLang === 'es'"
            [class.text-white/50]="currentLang !== 'es'"
          >
            <svg class="w-5 h-4 rounded-sm" viewBox="0 0 640 480">
              <path fill="#c60b1e" d="M0 0h640v480H0z" />
              <path fill="#ffc400" d="M0 120h640v240H0z" />
            </svg>
            <span>Español</span>
          </button>
          <button
            (click)="setLanguage('en')"
            class="flex items-center gap-2 px-4 py-3 text-sm rounded"
            [class.bg-accent]="currentLang === 'en'"
            [class.text-white]="currentLang === 'en'"
            [class.text-white/50]="currentLang !== 'en'"
          >
            <svg class="w-5 h-4 rounded-sm" viewBox="0 0 640 480">
              <path fill="#012169" d="M0 0h640v480H0z" />
              <path
                fill="#fff"
                d="m75 0 244 181L562 0h78v62L400 241l240 178v61h-80L320 301 81 480H0v-60l239-178L0 64V0h75z"
              />
              <path
                fill="#C8102E"
                d="m424 281 216 159v40L369 281h55zm-184 20 6 35L54 480H0l240-179zM640 0v3L391 191l2-44L590 0h50zM0 0l239 176h-60L0 42V0z"
              />
              <path fill="#fff" d="M241 0v480h160V0H241zM0 160v160h640V160H0z" />
              <path fill="#C8102E" d="M0 193v96h640v-96H0zM273 0v480h96V0h-96z" />
            </svg>
            <span>English</span>
          </button>
        </div>

        <button (click)="scrollToSection('#contact')" class="btn-primary text-center mt-4">
          {{ i18n.t('nav.book') }}
        </button>
      </div>
    </div>
  }
</nav>
