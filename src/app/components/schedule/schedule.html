<section id="schedule" class="py-24 lg:py-32 bg-primary">
  <div class="max-w-4xl mx-auto px-6 lg:px-8">
    <div #scheduleSection class="reveal text-center mb-12">
      <p class="section-label">{{ i18n.t('schedule.label') }}</p>
      <h2 class="section-title" [innerHTML]="i18n.t('schedule.title')"></h2>
      <div class="w-12 h-0.5 bg-accent mx-auto"></div>
    </div>

    <div #scheduleSection class="reveal bg-secondary border border-white/10">
      @for (item of getSchedule(); track item.day; let i = $index) {
        <div
          class="flex items-center justify-between px-8 py-5 transition-all duration-300 border-b border-white/5 last:border-b-0"
          [class.bg-accent/10]="i === currentDayIndex"
          [class.border-l-4]="i === currentDayIndex"
          [class.border-accent]="i === currentDayIndex"
        >
          <div class="flex items-center gap-4">
            @if (i === currentDayIndex) {
              <span class="w-2 h-2 bg-accent rounded-full animate-pulse"></span>
            }
            <span
              class="text-lg font-medium"
              [class.text-accent]="i === currentDayIndex"
              [class.text-white]="i !== currentDayIndex"
            >
              {{ item.day }}
            </span>
          </div>
          <span
            class="font-playfair text-lg"
            [class.text-accent]="i === currentDayIndex"
            [class.text-white]="i !== currentDayIndex"
          >
            {{ item.hours }}
          </span>
        </div>
      }
    </div>

    <div #scheduleSection class="reveal mt-8 text-center">
      <p class="text-white/50 flex items-center justify-center gap-2">
        <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        {{ i18n.t('schedule.note') }}
      </p>
    </div>
  </div>
</section>
